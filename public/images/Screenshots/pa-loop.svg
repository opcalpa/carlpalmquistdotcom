<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" fill="none" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgba(68,64,60,0.6)"/>
    </marker>
    <filter id="pillShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="rgba(28,25,23,0.13)"/>
    </filter>
  </defs>

  <!-- flow arcs (clockwise loop) -->
  <g stroke="rgba(68,64,60,0.45)" stroke-width="2.5" marker-end="url(#ah)">
    <path d="M882.7,181.6 A300,300 0 0 1 1048.7,302.2"/>
    <path d="M1099.8,459.5 A300,300 0 0 1 1036.4,654.7"/>
    <path d="M902.6,751.9 A300,300 0 0 1 697.4,751.9"/>
    <path d="M563.6,654.7 A300,300 0 0 1 500.2,459.5"/>
    <path d="M551.3,302.2 A300,300 0 0 1 717.3,181.6"/>
  </g>

  <!-- packets travelling the loop -->
  <g fill="rgba(28,25,23,0.82)">
    <circle cx="972.1" cy="224.2" r="6"/>
    <circle cx="1081.9" cy="572.6" r="6"/>
    <circle cx="518.1" cy="572.6" r="6"/>
    <circle cx="607.2" cy="240.2" r="6"/>
  </g>

  <!-- center caption -->
  <text x="800" y="460" text-anchor="middle" font-size="26" font-weight="600" letter-spacing="5" fill="#a8a29e">SELF-IMPROVING</text>
  <text x="800" y="494" text-anchor="middle" font-size="26" font-weight="600" letter-spacing="5" fill="#a8a29e">LOOP</text>

  <!-- stage pills -->
  <g filter="url(#pillShadow)">
    <rect x="680" y="143" width="240" height="54" rx="27" fill="#ffffff" stroke="rgba(28,25,23,0.14)"/>
    <rect x="995.3" y="350.3" width="180" height="54" rx="27" fill="#ffffff" stroke="rgba(28,25,23,0.14)"/>
    <rect x="871.3" y="685.7" width="210" height="54" rx="27" fill="#ffffff" stroke="rgba(28,25,23,0.14)"/>
    <rect x="508.7" y="685.7" width="230" height="54" rx="27" fill="#ffffff" stroke="rgba(28,25,23,0.14)"/>
    <rect x="402.2" y="350.3" width="225" height="54" rx="27" fill="#ffffff" stroke="rgba(28,25,23,0.14)"/>
  </g>
  <g fill="rgba(28,25,23,0.95)" font-size="24" font-weight="500" text-anchor="middle">
    <text x="800" y="178">Plain-text data</text>
    <text x="1085.3" y="385.3">AI reads it</text>
    <text x="976.3" y="720.7">Drafts &amp; acts</text>
    <text x="623.7" y="720.7">Human approves</text>
    <text x="514.7" y="385.3">Ships &amp; learns</text>
  </g>
</svg>
